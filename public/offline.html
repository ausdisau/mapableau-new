<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0b6e99" />
    <title>MapAble — Offline</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f8fafc;
        --text: #0f172a;
        --muted: #475569;
        --accent: #0b6e99;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        background: var(--bg);
        color: var(--text);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1.5rem;
      }
      main {
        max-width: 22rem;
        text-align: center;
      }
      h1 {
        font-size: 1.25rem;
        margin: 0 0 0.75rem;
      }
      p {
        margin: 0 0 1.25rem;
        color: var(--muted);
        line-height: 1.5;
      }
      button,
      a {
        display: inline-block;
        min-height: 44px;
        min-width: 44px;
        padding: 0.75rem 1.25rem;
        font-size: 1rem;
        border-radius: 0.5rem;
        text-decoration: none;
        cursor: pointer;
      }
      button {
        border: none;
        background: var(--accent);
        color: #fff;
        font-weight: 600;
      }
      button:focus-visible,
      a:focus-visible {
        outline: 3px solid #38bdf8;
        outline-offset: 2px;
      }
      #status {
        margin-top: 1rem;
        font-size: 0.875rem;
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <main>
      <h1>You are offline</h1>
      <p>
        MapAble could not reach the network. Some pages need a connection.
        Check your signal and try again.
      </p>
      <button type="button" id="retry">Try again</button>
      <p id="status" role="status" aria-live="polite"></p>
    </main>
    <script>
      const status = document.getElementById("status");
      const retry = document.getElementById("retry");
      function goHome() {
        window.location.href = "/";
      }
      retry.addEventListener("click", function () {
        status.textContent = "Checking connection…";
        if (navigator.onLine) {
          goHome();
        } else {
          status.textContent = "Still offline. Try again when you have signal.";
        }
      });
      window.addEventListener("online", function () {
        status.textContent = "Back online. Opening MapAble…";
        goHome();
      });
    </script>
  </body>
</html>
