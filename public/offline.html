<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#003F88" />
    <title>MapAble — Offline</title>
    <style>
      :root {
        --primary: #003f88;
        --text: #1a2b3c;
        --muted: #5a6b7c;
        --bg: #f5f8fb;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: system-ui, -apple-system, Segoe UI, sans-serif;
        background: var(--bg);
        color: var(--text);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1.5rem;
      }
      main {
        max-width: 24rem;
        text-align: center;
      }
      h1 {
        font-size: 1.5rem;
        margin: 0 0 0.75rem;
        color: var(--primary);
      }
      p {
        margin: 0 0 1rem;
        line-height: 1.5;
        color: var(--muted);
      }
      a,
      button {
        display: inline-block;
        min-height: 44px;
        min-width: 44px;
        padding: 0.75rem 1.25rem;
        border-radius: 0.75rem;
        font-size: 1rem;
        font-weight: 600;
        text-decoration: none;
        border: none;
        cursor: pointer;
      }
      a {
        background: var(--primary);
        color: #fff;
      }
      button {
        margin-top: 0.5rem;
        background: transparent;
        color: var(--primary);
        border: 2px solid var(--primary);
      }
    </style>
  </head>
  <body>
    <main>
      <h1>You are offline</h1>
      <p>
        MapAble could not reach the network. Some pages need a connection. Your
        saved drafts will sync when you are back online.
      </p>
      <a href="/">Try again</a>
      <br />
      <button type="button" onclick="location.reload()">Reload page</button>
    </main>
  </body>
</html>
